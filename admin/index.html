<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>村山良作 CMS</title>
<link rel="icon" href="/assets/images/murayama-favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{--bg:#141414;--bg2:#1e1e1e;--bg3:#2a2a2a;--text:#fff;--muted:rgba(255,255,255,.6);--accent:#e50914;--blue:#2563eb;--purple:#7c3aed;--green:#16a34a;--gold:#eab308;--border:rgba(255,255,255,.1);--radius:6px}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',system-ui,sans-serif;font-size:14px}
a{color:var(--accent);text-decoration:none}

/* Layout */
.app{max-width:1200px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{margin:0;font-size:1.4rem;font-weight:700}
.header-right{display:flex;align-items:center;gap:12px}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg2);padding:40px;border-radius:8px;width:360px}
.login-box h2{margin:0 0 24px;text-align:center}
.login-box input{width:100%;padding:10px 12px;margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:14px}
.login-box button{width:100%;padding:12px;border:0;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.login-box .error{color:var(--accent);font-size:13px;margin-bottom:8px;display:none}

/* Buttons */
.btn{padding:8px 16px;border:0;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:#991b1b;color:#fff}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.toolbar .search{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:13px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.03)}
.thumb{width:60px;height:40px;object-fit:cover;border-radius:3px;background:var(--bg3)}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.badge-business{background:rgba(37,99,235,.2);color:#60a5fa}
.badge-party{background:rgba(124,58,237,.2);color:#a78bfa}
.badge-magic{background:rgba(234,179,8,.2);color:#facc15}
.badge-civil{background:rgba(22,163,74,.2);color:#4ade80}
.badge-featured{background:rgba(234,179,8,.15);color:var(--gold);margin-left:4px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-overlay.is-open{display:flex}
.modal{background:var(--bg2);border-radius:8px;width:100%;max-width:720px;padding:24px}
.modal h2{margin:0 0 20px;font-size:1.2rem}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Form */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
.field input,.field textarea,.field select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-check{display:flex;align-items:center;gap:8px}
.field-check input{width:auto}
.field-check label{margin:0;font-size:13px;color:var(--text)}

/* Hero upload */
.hero-zone{position:relative;border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;min-height:120px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.hero-zone:hover,.hero-zone.drag-over{border-color:var(--accent)}
.hero-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.hero-zone .placeholder{color:var(--muted);font-size:13px}
.hero-zone .placeholder svg{display:block;margin:0 auto 6px;width:32px;height:32px;fill:var(--muted)}
.hero-preview-wrap{position:relative;display:inline-block}
.hero-preview-wrap img{max-height:160px;border-radius:var(--radius)}
.hero-preview-wrap .hero-remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;border:0;background:rgba(0,0,0,.7);color:#fff;font-size:14px;cursor:pointer;display:grid;place-items:center;line-height:1}

/* Gallery */
.gallery-section{margin-top:4px}
.gallery-section label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:10px;min-height:40px}
.gallery-item{position:relative;aspect-ratio:3/2;border-radius:4px;overflow:hidden;cursor:pointer;background:var(--bg3);border:2px solid transparent;transition:border-color .15s,box-shadow .15s}
.gallery-item.sortable-ghost{opacity:.4}
.gallery-item.is-hero{border-color:var(--gold);box-shadow:0 0 0 2px rgba(234,179,8,.3)}
.gallery-item img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.gallery-item .gallery-badge{position:absolute;top:3px;left:3px;font-size:9px;padding:2px 6px;border-radius:2px;background:rgba(234,179,8,.9);color:#000;font-weight:700;letter-spacing:.5px}
.gallery-item .gallery-order{position:absolute;bottom:3px;left:3px;font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(0,0,0,.7);color:#fff}
.gallery-item .gallery-set-hero{position:absolute;bottom:3px;right:3px;padding:2px 6px;border-radius:2px;border:0;background:rgba(0,0,0,.7);color:var(--muted);font-size:9px;cursor:pointer;opacity:0;transition:opacity .15s}
.gallery-item:hover .gallery-set-hero{opacity:1}
.gallery-item.is-hero .gallery-set-hero{display:none}
.gallery-item .gallery-remove{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;border:0;background:rgba(153,27,27,.9);color:#fff;font-size:11px;cursor:pointer;display:grid;place-items:center;opacity:0;transition:opacity .15s}
.gallery-item:hover .gallery-remove{opacity:1}
.gallery-upload-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border:1px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;position:relative;transition:border-color .2s}
.gallery-upload-btn:hover{border-color:var(--accent);color:var(--text)}
.gallery-upload-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* Upload progress */
.upload-progress{margin-top:6px;font-size:12px;color:var(--muted);display:none}
.upload-progress.is-active{display:block}
.upload-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:4px;overflow:hidden}
.upload-bar-fill{height:100%;background:var(--accent);width:0;transition:width .3s}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.confirm-overlay.is-open{display:flex}
.confirm-box{background:var(--bg2);padding:24px;border-radius:8px;max-width:400px;text-align:center}
.confirm-box p{margin:0 0 20px;font-size:15px}
.confirm-box .actions{display:flex;justify-content:center;gap:10px}

/* Category filter tabs */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap}
.cat-tab{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.cat-tab:hover{border-color:rgba(255,255,255,.3);color:var(--text)}
.cat-tab.is-active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Drag handle in table */
.drag-handle{cursor:grab;color:var(--muted);font-size:16px;user-select:none;padding:0 4px;letter-spacing:-1px}
.drag-handle:active{cursor:grabbing}
tr.is-dragging{opacity:.4}
tr.drag-above td{box-shadow:inset 0 2px 0 var(--accent)}
tr.drag-below td{box-shadow:inset 0 -2px 0 var(--accent)}

/* Toast */
.admin-toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:var(--radius);background:#16a34a;color:#fff;font-weight:600;font-size:13px;opacity:0;transform:translateY(10px);transition:all .3s;z-index:300;pointer-events:none}
.admin-toast.is-visible{opacity:1;transform:translateY(0)}

/* Gallery Lightbox */
.gallery-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:250;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.gallery-lightbox.is-open{display:flex}
.gallery-lightbox img{max-width:90vw;max-height:70vh;object-fit:contain;border-radius:6px}
.gallery-lightbox .lb-close{position:absolute;top:16px;right:20px;background:none;border:0;color:#fff;font-size:28px;cursor:pointer}
.gallery-lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:0;color:#fff;font-size:24px;padding:12px 16px;cursor:pointer;border-radius:4px}
.gallery-lightbox .lb-nav:hover{background:rgba(255,255,255,.3)}
.gallery-lightbox .lb-prev{left:16px}
.gallery-lightbox .lb-next{right:16px}
.gallery-lightbox .lb-info{color:var(--muted);font-size:13px}
.gallery-lightbox .lb-actions{display:flex;gap:10px}
.gallery-lightbox .lb-actions button{padding:8px 16px;border-radius:var(--radius);border:0;font-size:13px;font-weight:600;cursor:pointer}
.gallery-lightbox .lb-set-hero{background:var(--gold);color:#000}
.gallery-lightbox .lb-delete{background:#991b1b;color:#fff}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h2>村山良作 CMS</h2>
    <div class="error" id="login-error">帳號或密碼錯誤</div>
    <input type="text" id="login-user" placeholder="帳號" autocomplete="username">
    <input type="password" id="login-pass" placeholder="密碼" autocomplete="current-password">
    <button onclick="doLogin()">登入</button>
  </div>
</div>

<!-- Main App -->
<div id="app-screen" class="app" style="display:none">
  <div class="header">
    <h1>村山良作 CMS</h1>
    <div class="header-right">
      <a href="/blog-netflix/" target="_blank">前台預覽</a>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="openAdd()">+ 新增作品</button>
    <div class="cat-tabs" id="cat-tabs">
      <button class="cat-tab is-active" data-cat="" onclick="filterCat(this)">全部</button>
      <button class="cat-tab" data-cat="business" onclick="filterCat(this)">主題活動</button>
      <button class="cat-tab" data-cat="party" onclick="filterCat(this)">春酒尾牙</button>
      <button class="cat-tab" data-cat="magic" onclick="filterCat(this)">魔法學院</button>
      <button class="cat-tab" data-cat="civil" onclick="filterCat(this)">戶政改造</button>
    </div>
    <input class="search" type="text" id="search-input" placeholder="搜尋作品..." oninput="renderList()">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:32px"></th>
          <th></th>
          <th>標題</th>
          <th>分類</th>
          <th>精選</th>
          <th>圖庫</th>
          <th>影片</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="article-list"></tbody>
    </table>
  </div>
</div>

<!-- Edit/Add Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">新增作品</h2>
    <input type="hidden" id="f-id">
    <div class="field">
      <label>標題</label>
      <input type="text" id="f-title" placeholder="作品名稱">
    </div>
    <div class="field">
      <label>描述</label>
      <textarea id="f-desc" placeholder="簡短描述（1-2句）"></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label>分類</label>
        <select id="f-category">
          <option value="business">主題活動</option>
          <option value="party">春酒尾牙</option>
          <option value="magic">魔法學院</option>
          <option value="civil">戶政改造</option>
        </select>
      </div>
      <div class="field">
        <label>排序 (數字越小越前)</label>
        <input type="number" id="f-sort" value="99">
      </div>
    </div>
    <div class="field-row">
      <div class="field-check">
        <input type="checkbox" id="f-featured" onchange="toggleFeaturedOrder()">
        <label for="f-featured">加入精選</label>
      </div>
      <div class="field" id="featured-order-field" style="display:none">
        <label>精選排序</label>
        <input type="number" id="f-featured-order" value="1" min="1">
      </div>
    </div>

    <!-- Hero Image Upload -->
    <div class="field">
      <label>Hero 封面圖</label>
      <div id="hero-zone" class="hero-zone">
        <div class="placeholder" id="hero-placeholder">
          <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
          點擊或拖曳上傳封面圖
        </div>
        <div class="hero-preview-wrap" id="hero-preview-wrap" style="display:none">
          <img id="hero-preview" src="">
          <button class="hero-remove" onclick="removeHero(event)">&times;</button>
        </div>
        <input type="file" accept="image/*" onchange="onHeroFileChange(event)">
      </div>
      <input type="hidden" id="f-hero">
    </div>

    <!-- Gallery -->
    <div class="gallery-section">
      <label>圖庫（拖曳調整順序・點擊「設封面」選擇 Hero）</label>
      <div class="gallery-grid" id="gallery-grid"></div>
      <div class="gallery-upload-btn" id="gallery-upload-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        新增圖片
        <input type="file" accept="image/*" multiple onchange="onGalleryFilesChange(event)">
      </div>
      <div class="upload-progress" id="upload-progress">
        <span id="upload-progress-text">上傳中...</span>
        <div class="upload-bar"><div class="upload-bar-fill" id="upload-bar-fill"></div></div>
      </div>
    </div>

    <div class="field-row" style="margin-top:14px">
      <div class="field">
        <label>YouTube 影片 ID (選填)</label>
        <input type="text" id="f-video" placeholder="例: 0G4eDWtAKpE">
      </div>
      <div class="field-check" style="padding-top:20px">
        <input type="checkbox" id="f-vertical">
        <label for="f-vertical">垂直影片 (9:16)</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveArticle()">儲存</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirm-dialog">
  <div class="confirm-box">
    <p id="confirm-msg">確定要刪除？</p>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirm-ok">確定刪除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="admin-toast" id="admin-toast"></div>

<!-- Gallery Lightbox -->
<div class="gallery-lightbox" id="gallery-lightbox">
  <button class="lb-close" onclick="closeLightbox()">&times;</button>
  <button class="lb-nav lb-prev" onclick="navLightbox(-1)">&#8249;</button>
  <button class="lb-nav lb-next" onclick="navLightbox(1)">&#8250;</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-info" id="lb-info"></div>
  <div class="lb-actions">
    <button class="lb-set-hero" onclick="lbSetHero()">★ 設為封面</button>
    <button class="lb-delete" onclick="lbDelete()">刪除此圖</button>
  </div>
</div>

<script>
var articles = [];
var authHeader = '';
var editImages = []; // current gallery images for the article being edited
var CAT_LABELS = {business:'主題活動',party:'春酒尾牙',magic:'魔法學院',civil:'戶政改造'};
var CAT_CLASSES = {business:'badge-business',party:'badge-party',magic:'badge-magic',civil:'badge-civil'};
var currentCatFilter = ''; // '' = all, 'business', 'party', 'civil'
var rowDragSrcId = null;

// ── Auth ──
function doLogin() {
  var user = document.getElementById('login-user').value.trim();
  var pass = document.getElementById('login-pass').value;
  authHeader = 'Basic ' + btoa(user + ':' + pass);
  fetch('/api/articles', { headers: { 'Authorization': authHeader } })
    .then(function(r) {
      if (r.ok) {
        sessionStorage.setItem('auth', authHeader);
        showApp();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    })
    .catch(function() { showApp(); });
}

function doLogout() {
  sessionStorage.removeItem('auth');
  authHeader = '';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = '';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = '';
  loadArticles();
}

(function() {
  var saved = sessionStorage.getItem('auth');
  if (saved) { authHeader = saved; showApp(); }
})();

// ── API ──
function api(method, path, body) {
  var opts = { method: method, headers: {} };
  if (authHeader) opts.headers['Authorization'] = authHeader;
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(path, opts).then(function(r) {
    if (!r.ok) throw new Error('API error: ' + r.status);
    return r.status === 204 ? null : r.json();
  });
}

function loadArticles() {
  api('GET', '/api/articles').then(function(data) {
    articles = (data && data.articles) || [];
    renderList();
  }).catch(function(e) { toast('載入失敗: ' + e.message, true); });
}

// ── Category filter ──
function filterCat(btn) {
  currentCatFilter = btn.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('is-active'); });
  btn.classList.add('is-active');
  renderList();
}

// ── Render List ──
function renderList() {
  var q = document.getElementById('search-input').value.toLowerCase();
  var tbody = document.getElementById('article-list');
  var filtered = articles.filter(function(a) {
    if (currentCatFilter && a.category !== currentCatFilter) return false;
    return !q || a.title.toLowerCase().includes(q) || (a.description || '').toLowerCase().includes(q);
  });
  var catOrder = {business:1, party:2, magic:3, civil:4};
  filtered.sort(function(a, b) {
    var ca = catOrder[a.category] || 99;
    var cb = catOrder[b.category] || 99;
    if (ca !== cb) return ca - cb;
    return (a.sortOrder || 99) - (b.sortOrder || 99);
  });

  tbody.innerHTML = filtered.map(function(a) {
    var cat = CAT_LABELS[a.category] || a.category;
    var catClass = CAT_CLASSES[a.category] || '';
    var featured = a.featured ? '<span class="badge badge-featured">\u2605 ' + (a.featuredOrder || '') + '</span>' : '';
    var video = a.videoId ? (a.videoVertical ? '\uD83D\uDCF1' : '\uD83C\uDFAC') : '\u2014';
    var heroSrc = a.heroImage || (a.images && a.images[0]) || '/assets/images/murayama-favicon.png';
    var imgCount = (a.images || []).length;

    return '<tr draggable="true" data-id="' + a.id + '">' +
      '<td><span class="drag-handle">\u22EE\u22EE</span></td>' +
      '<td><img class="thumb" src="' + heroSrc + '" alt="" onerror="this.style.display=\'none\'"></td>' +
      '<td><strong>' + esc(a.title) + '</strong></td>' +
      '<td><span class="badge ' + catClass + '">' + cat + '</span></td>' +
      '<td>' + featured + '</td>' +
      '<td>' + imgCount + ' 張</td>' +
      '<td>' + video + '</td>' +
      '<td>' +
        '<button class="btn btn-secondary btn-sm" onclick="openEdit(\'' + a.id + '\')">編輯</button> ' +
        '<button class="btn btn-danger btn-sm" onclick="confirmDelete(\'' + a.id + '\',\'' + esc(a.title) + '\')">刪除</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  // Bind row drag events
  bindRowDrag();
}

// ── Row Drag-and-Drop ──
function bindRowDrag() {
  var tbody = document.getElementById('article-list');
  var rows = tbody.querySelectorAll('tr[draggable]');
  rows.forEach(function(row) {
    row.addEventListener('dragstart', function(e) {
      rowDragSrcId = row.dataset.id;
      row.classList.add('is-dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', function() {
      row.classList.remove('is-dragging');
      tbody.querySelectorAll('tr').forEach(function(r) {
        r.classList.remove('drag-above', 'drag-below');
      });
    });
    row.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      var rect = row.getBoundingClientRect();
      var mid = rect.top + rect.height / 2;
      tbody.querySelectorAll('tr').forEach(function(r) { r.classList.remove('drag-above', 'drag-below'); });
      if (e.clientY < mid) {
        row.classList.add('drag-above');
      } else {
        row.classList.add('drag-below');
      }
    });
    row.addEventListener('dragleave', function() {
      row.classList.remove('drag-above', 'drag-below');
    });
    row.addEventListener('drop', function(e) {
      e.preventDefault();
      row.classList.remove('drag-above', 'drag-below');
      var targetId = row.dataset.id;
      if (!rowDragSrcId || rowDragSrcId === targetId) return;

      var rect = row.getBoundingClientRect();
      var mid = rect.top + rect.height / 2;
      var insertBefore = e.clientY < mid;

      reorderArticles(rowDragSrcId, targetId, insertBefore);
    });
  });
}

function reorderArticles(srcId, targetId, insertBefore) {
  // Get visible filtered+sorted list to determine new order
  var catOrder = {business:1, party:2, magic:3, civil:4};
  var filtered = articles.filter(function(a) {
    if (currentCatFilter && a.category !== currentCatFilter) return false;
    return true;
  });
  filtered.sort(function(a, b) {
    var ca = catOrder[a.category] || 99;
    var cb = catOrder[b.category] || 99;
    if (ca !== cb) return ca - cb;
    return (a.sortOrder || 99) - (b.sortOrder || 99);
  });

  // Remove src from list and insert at target position
  var srcIdx = filtered.findIndex(function(a) { return a.id === srcId; });
  var tgtIdx = filtered.findIndex(function(a) { return a.id === targetId; });
  if (srcIdx === -1 || tgtIdx === -1) return;

  var moved = filtered.splice(srcIdx, 1)[0];
  var newTgtIdx = filtered.findIndex(function(a) { return a.id === targetId; });
  if (newTgtIdx === -1) newTgtIdx = filtered.length;
  if (!insertBefore) newTgtIdx++;
  filtered.splice(newTgtIdx, 0, moved);

  // Reassign sortOrder per category group
  var catGroups = {};
  filtered.forEach(function(a) {
    if (!catGroups[a.category]) catGroups[a.category] = [];
    catGroups[a.category].push(a);
  });

  var updates = [];
  Object.keys(catGroups).forEach(function(cat) {
    catGroups[cat].forEach(function(a, i) {
      var newOrder = i + 1;
      if (a.sortOrder !== newOrder) {
        a.sortOrder = newOrder;
        updates.push(a);
      }
    });
  });

  renderList();

  // Save changes to server
  if (updates.length === 0) return;
  toast('排序更新中...');
  var pending = updates.length;
  var failed = 0;
  updates.forEach(function(a) {
    api('PUT', '/api/articles/' + a.id, { sortOrder: a.sortOrder })
      .then(function() {
        pending--;
        if (pending === 0) toast(failed ? '部分排序更新失敗' : '排序已儲存');
      })
      .catch(function() {
        failed++;
        pending--;
        if (pending === 0) toast('部分排序更新失敗', true);
      });
  });
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── Modal ──
function openAdd() {
  document.getElementById('modal-title').textContent = '新增作品';
  document.getElementById('f-id').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-category').value = 'business';
  document.getElementById('f-sort').value = articles.length + 1;
  document.getElementById('f-featured').checked = false;
  document.getElementById('f-featured-order').value = '1';
  document.getElementById('f-hero').value = '';
  document.getElementById('f-video').value = '';
  document.getElementById('f-vertical').checked = false;
  editImages = [];
  renderHeroPreview('');
  renderGallery();
  toggleFeaturedOrder();
  document.getElementById('modal').classList.add('is-open');
}

function openEdit(id) {
  var a = articles.find(function(x) { return x.id === id; });
  if (!a) return;
  document.getElementById('modal-title').textContent = '編輯：' + a.title;
  document.getElementById('f-id').value = a.id;
  document.getElementById('f-title').value = a.title || '';
  document.getElementById('f-desc').value = a.description || '';
  document.getElementById('f-category').value = a.category || 'business';
  document.getElementById('f-sort').value = a.sortOrder || 1;
  document.getElementById('f-featured').checked = !!a.featured;
  document.getElementById('f-featured-order').value = a.featuredOrder || 1;
  document.getElementById('f-hero').value = a.heroImage || '';
  document.getElementById('f-video').value = a.videoId || '';
  document.getElementById('f-vertical').checked = !!a.videoVertical;
  editImages = (a.images || []).slice(); // clone
  renderHeroPreview(a.heroImage || (a.images && a.images[0]) || '');
  renderGallery();
  toggleFeaturedOrder();
  document.getElementById('modal').classList.add('is-open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('is-open');
}

function toggleFeaturedOrder() {
  var show = document.getElementById('f-featured').checked;
  document.getElementById('featured-order-field').style.display = show ? '' : 'none';
}

// ── Hero Image ──
function renderHeroPreview(src) {
  var wrap = document.getElementById('hero-preview-wrap');
  var placeholder = document.getElementById('hero-placeholder');
  var img = document.getElementById('hero-preview');
  if (src) {
    img.src = src;
    wrap.style.display = '';
    placeholder.style.display = 'none';
  } else {
    wrap.style.display = 'none';
    placeholder.style.display = '';
  }
}

function onHeroFileChange(e) {
  var files = e.target.files;
  if (!files || !files.length) return;
  var articleId = document.getElementById('f-id').value;
  if (!articleId) {
    toast('請先儲存作品再上傳圖片', true);
    e.target.value = '';
    return;
  }
  uploadFiles(articleId, files, function(paths) {
    if (paths.length > 0) {
      var heroPath = paths[0].startsWith('/') ? paths[0] : '/' + paths[0];
      document.getElementById('f-hero').value = heroPath;
      renderHeroPreview(heroPath);
      // Also add to gallery if not already
      paths.forEach(function(p) {
        var fullPath = p.startsWith('/') ? p : '/' + p;
        if (editImages.indexOf(fullPath) === -1) {
          editImages.unshift(fullPath); // hero goes first
        }
      });
      renderGallery();
    }
  });
  e.target.value = '';
}

function removeHero(e) {
  e.stopPropagation();
  document.getElementById('f-hero').value = '';
  renderHeroPreview('');
}

// ── Gallery (SortableJS drag-to-reorder) ──
var gallerySortable = null;

function renderGallery() {
  var grid = document.getElementById('gallery-grid');
  var heroVal = document.getElementById('f-hero').value;
  grid.innerHTML = editImages.map(function(src, i) {
    var isHero = (src === heroVal);
    return '<div class="gallery-item' + (isHero ? ' is-hero' : '') + '" data-index="' + i + '" onclick="openLightbox(' + i + ')">' +
      '<img src="' + src + '" alt="">' +
      (isHero ? '<span class="gallery-badge">★ 封面</span>' : '') +
      '<span class="gallery-order">' + (i + 1) + '</span>' +
      '<button class="gallery-remove" onclick="removeGalleryImage(' + i + ',event)">&times;</button>' +
    '</div>';
  }).join('');

  // Init SortableJS
  if (gallerySortable) gallerySortable.destroy();
  gallerySortable = new Sortable(grid, {
    animation: 200,
    ghostClass: 'sortable-ghost',
    onEnd: function(evt) {
      var oldIdx = evt.oldIndex;
      var newIdx = evt.newIndex;
      if (oldIdx === newIdx) return;
      var moved = editImages.splice(oldIdx, 1)[0];
      editImages.splice(newIdx, 0, moved);
      renderGallery();
    }
  });
}

function setHeroImage(index, e) {
  if (e) e.stopPropagation();
  var src = editImages[index];
  if (!src) return;
  document.getElementById('f-hero').value = src;
  renderHeroPreview(src);
  renderGallery();
  toast('已設為封面圖');
}

// ── Gallery Lightbox ──
var lbIndex = 0;

function openLightbox(index) {
  lbIndex = index;
  updateLightbox();
  document.getElementById('gallery-lightbox').classList.add('is-open');
}

function closeLightbox() {
  document.getElementById('gallery-lightbox').classList.remove('is-open');
}

function navLightbox(dir) {
  lbIndex = (lbIndex + dir + editImages.length) % editImages.length;
  updateLightbox();
}

function updateLightbox() {
  var src = editImages[lbIndex];
  var heroVal = document.getElementById('f-hero').value;
  document.getElementById('lb-img').src = src;
  var isHero = (src === heroVal);
  document.getElementById('lb-info').textContent = (lbIndex + 1) + ' / ' + editImages.length + (isHero ? '  ★ 目前封面' : '');
}

function lbSetHero() {
  setHeroImage(lbIndex);
  updateLightbox();
}

function lbDelete() {
  removeGalleryImage(lbIndex, { stopPropagation: function(){} });
  if (editImages.length === 0) { closeLightbox(); return; }
  if (lbIndex >= editImages.length) lbIndex = editImages.length - 1;
  updateLightbox();
}

// Keyboard nav for lightbox
document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('gallery-lightbox');
  if (!lb.classList.contains('is-open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

function removeGalleryImage(index, e) {
  e.stopPropagation();
  editImages.splice(index, 1);
  // If removed image was hero, update hero to new first
  var heroVal = document.getElementById('f-hero').value;
  if (editImages.length === 0) {
    document.getElementById('f-hero').value = '';
    renderHeroPreview('');
  } else if (editImages.indexOf(heroVal) === -1) {
    document.getElementById('f-hero').value = editImages[0];
    renderHeroPreview(editImages[0]);
  }
  renderGallery();
}

function onGalleryFilesChange(e) {
  var files = e.target.files;
  if (!files || !files.length) return;
  var articleId = document.getElementById('f-id').value;
  if (!articleId) {
    toast('請先儲存作品再上傳圖片', true);
    e.target.value = '';
    return;
  }
  uploadFiles(articleId, files, function(paths) {
    paths.forEach(function(p) {
      var fullPath = p.startsWith('/') ? p : '/' + p;
      if (editImages.indexOf(fullPath) === -1) {
        editImages.push(fullPath);
      }
    });
    // If no hero set, use first image
    if (!document.getElementById('f-hero').value && editImages.length > 0) {
      document.getElementById('f-hero').value = editImages[0];
      renderHeroPreview(editImages[0]);
    }
    renderGallery();
  });
  e.target.value = '';
}

// ── Upload ──
function uploadFiles(articleId, files, callback) {
  var progressEl = document.getElementById('upload-progress');
  var progressText = document.getElementById('upload-progress-text');
  var barFill = document.getElementById('upload-bar-fill');
  progressEl.classList.add('is-active');
  progressText.textContent = '上傳中... 0/' + files.length;
  barFill.style.width = '0%';

  var formData = new FormData();
  for (var i = 0; i < files.length; i++) {
    formData.append('file' + i, files[i], files[i].name);
  }

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/upload/' + articleId);
  if (authHeader) xhr.setRequestHeader('Authorization', authHeader);

  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
      var pct = Math.round(e.loaded / e.total * 100);
      barFill.style.width = pct + '%';
      progressText.textContent = '上傳中... ' + pct + '%';
    }
  };

  xhr.onload = function() {
    progressEl.classList.remove('is-active');
    if (xhr.status >= 200 && xhr.status < 300) {
      var resp = JSON.parse(xhr.responseText);
      toast('已上傳 ' + (resp.uploaded || []).length + ' 張圖片');
      callback(resp.uploaded || []);
    } else {
      toast('上傳失敗: ' + xhr.status, true);
      callback([]);
    }
  };

  xhr.onerror = function() {
    progressEl.classList.remove('is-active');
    toast('上傳失敗', true);
    callback([]);
  };

  xhr.send(formData);
}

// ── Save ──
function saveArticle() {
  var id = document.getElementById('f-id').value;
  var title = document.getElementById('f-title').value.trim();
  if (!title) { toast('請輸入標題', true); return; }

  var heroImage = document.getElementById('f-hero').value.trim();
  // Ensure hero is first in images array
  if (heroImage && editImages.indexOf(heroImage) !== 0) {
    editImages = editImages.filter(function(x) { return x !== heroImage; });
    editImages.unshift(heroImage);
  }

  var data = {
    title: title,
    description: document.getElementById('f-desc').value.trim(),
    category: document.getElementById('f-category').value,
    sortOrder: parseInt(document.getElementById('f-sort').value) || 99,
    featured: document.getElementById('f-featured').checked,
    featuredOrder: document.getElementById('f-featured').checked ? parseInt(document.getElementById('f-featured-order').value) || 1 : 0,
    heroImage: heroImage || (editImages[0] || ''),
    images: editImages,
    videoId: document.getElementById('f-video').value.trim() || null,
    videoVertical: document.getElementById('f-vertical').checked
  };

  if (id) {
    api('PUT', '/api/articles/' + id, data).then(function() {
      toast('已更新：' + title);
      closeModal();
      loadArticles();
    }).catch(function(e) { toast('更新失敗: ' + e.message, true); });
  } else {
    api('POST', '/api/articles', data).then(function(resp) {
      toast('已新增：' + title);
      // If we got back the new article with id, set it so user can upload images
      if (resp && resp.id) {
        document.getElementById('f-id').value = resp.id;
      }
      closeModal();
      loadArticles();
    }).catch(function(e) { toast('新增失敗: ' + e.message, true); });
  }
}

// ── Delete ──
function confirmDelete(id, title) {
  document.getElementById('confirm-msg').textContent = '確定要刪除「' + title + '」？';
  document.getElementById('confirm-dialog').classList.add('is-open');
  document.getElementById('confirm-ok').onclick = function() {
    api('DELETE', '/api/articles/' + id).then(function() {
      toast('已刪除');
      closeConfirm();
      loadArticles();
    }).catch(function(e) { toast('刪除失敗: ' + e.message, true); });
  };
}

function closeConfirm() {
  document.getElementById('confirm-dialog').classList.remove('is-open');
}

// ── Toast ──
function toast(msg, isError) {
  var el = document.getElementById('admin-toast');
  el.textContent = msg;
  el.style.background = isError ? '#991b1b' : '#16a34a';
  el.classList.add('is-visible');
  setTimeout(function() { el.classList.remove('is-visible'); }, 2500);
}
